services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mcp_gateway
      POSTGRES_USER: mcp
      POSTGRES_PASSWORD: mcp_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcp -d mcp_gateway"]
      interval: 5s
      timeout: 5s
      retries: 5

  gateway:
    build: .
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://mcp:mcp_secret@postgres:5432/mcp_gateway?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
