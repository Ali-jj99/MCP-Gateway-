name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: mcp_gateway_test
          POSTGRES_USER: mcp
          POSTGRES_PASSWORD: mcp_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mcp -d mcp_gateway_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -count=1 ./...
        env:
          DATABASE_URL: postgres://mcp:mcp_secret@localhost:5432/mcp_gateway_test?sslmode=disable

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12
